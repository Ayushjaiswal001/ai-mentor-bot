name: keep-alive

# Pings the Render health endpoint so the free service doesn't spin down after 15 min idle.
# Render free sleeps on no INBOUND traffic; the bot's outbound Telegram polling doesn't count.
# Note: GitHub cron can be delayed under load; for rock-solid timing add a cron-job.org monitor too.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch: {} # allow manual run from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /healthz
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://ai-mentor-bot-ztj4.onrender.com/healthz)
          echo "healthz HTTP $code"
          test "$code" = "200"
