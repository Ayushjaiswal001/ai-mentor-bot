name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: pathwayai
          POSTGRES_PASSWORD: pathwayai
          POSTGRES_DB: pathwayai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pathwayai -d pathwayai_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      APP_ENV: test
      DATABASE_URL: postgresql://pathwayai:pathwayai@127.0.0.1:5432/pathwayai_test
      TEST_DATABASE_URL: postgresql://pathwayai:pathwayai@127.0.0.1:5432/pathwayai_test
      INTERNAL_TRIGGER_SECRET: ci-only-secret
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv sync --locked --dev
      - run: uv run ruff check
      - run: uv run alembic upgrade head
      - run: uv run pytest
