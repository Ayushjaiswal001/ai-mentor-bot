name: Weekly prune

on:
  schedule:
    # Runs after the Sunday 17:30 UTC backup so pruned rows are still captured.
    - cron: "30 18 * * 0"
  workflow_dispatch:

permissions: {}
concurrency:
  group: weekly-prune
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Prune outbound, model-call, and dedup rows older than 90 days
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_TRIGGER_SECRET: ${{ secrets.INTERNAL_TRIGGER_SECRET }}
        run: |
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "X-PathwayAI-Secret: $INTERNAL_TRIGGER_SECRET" \
            "$APP_BASE_URL/admin/prune?days=90"
