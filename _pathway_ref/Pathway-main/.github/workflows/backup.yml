name: Encrypted database backup

on:
  schedule:
    - cron: "30 17 * * 0"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: database-backup
  cancel-in-progress: false

jobs:
  backup-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Export and encrypt
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          test -n "$DATABASE_URL"
          test -n "$BACKUP_ENCRYPTION_KEY"
          pg_dump --format=custom --no-owner --no-acl "$DATABASE_URL" > pathwayai.dump
          gpg --batch --yes --symmetric --cipher-algo AES256 \
            --passphrase "$BACKUP_ENCRYPTION_KEY" \
            --output pathwayai.dump.gpg pathwayai.dump
          rm pathwayai.dump
      - name: Verify restore
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          gpg --batch --yes --decrypt \
            --passphrase "$BACKUP_ENCRYPTION_KEY" \
            --output pathwayai.dump pathwayai.dump.gpg
          docker run --detach --name pathwayai-restore \
            -e POSTGRES_PASSWORD=verify -e POSTGRES_DB=verify \
            -p 55432:5432 pgvector/pgvector:pg17
          until pg_isready -h 127.0.0.1 -p 55432 -U postgres -d verify; do sleep 2; done
          PGPASSWORD=verify pg_restore --exit-on-error --no-owner --no-acl \
            -h 127.0.0.1 -p 55432 -U postgres -d verify pathwayai.dump
          rm pathwayai.dump
      - uses: actions/upload-artifact@v4
        with:
          name: pathwayai-encrypted-backup-${{ github.run_id }}
          path: pathwayai.dump.gpg
          retention-days: 14
          if-no-files-found: error
