name: Weekly digest email

on:
  schedule:
    - cron: "30 2 * * 1" # Monday 08:00 IST (Asia/Kolkata)
  workflow_dispatch:

permissions: {}
concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Mail the weekly export digest
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_TRIGGER_SECRET: ${{ secrets.INTERNAL_TRIGGER_SECRET }}
        run: |
          curl --fail-with-body --retry 3 \
            -X POST \
            -H "X-PathwayAI-Secret: $INTERNAL_TRIGGER_SECRET" \
            "$APP_BASE_URL/admin/weekly-digest"
